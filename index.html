<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Personal Finance Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,400;1,9..144,200;1,9..144,400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-zoom/1.2.1/chartjs-plugin-zoom.min.js"></script>
  <style>:root {
  --bg: #0c0e14;
  --s1: rgba(255, 255, 255, 0.05);
  --s2: rgba(255, 255, 255, 0.08);
  --s3: rgba(255, 255, 255, 0.1);
  --b1: rgba(255, 255, 255, 0.1);
  --b2: rgba(255, 255, 255, 0.2);
  --t1: #f1f5f9;
  --t2: #94a3b8;
  --t3: #cbd5e1;
  --t4: #4a5568;
  --gold: #6366f1;
  --goldx: rgba(99, 102, 241, 0.13);
  --green: #34d399;
  --greenx: rgba(52, 211, 153, 0.13);
  --red: #f87171;
  --redx: rgba(248, 113, 113, 0.13);
  --blue: #a78bfa;
  --r: 32px;
  --rs: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--t1); font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; padding-bottom: 80px; overflow-x: hidden; position: relative; }
input, select { font-family: inherit; font-size: 14px; background: rgba(0,0,0,0.2); color: var(--t1); border: 1px solid var(--b1); padding: 10px 14px; border-radius: var(--rs); width: 100%; transition: border-color 0.2s, background 0.2s; backdrop-filter: blur(10px); }
input:focus, select:focus { border-color: var(--gold); background: rgba(255,255,255,0.05); }
button { font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid transparent; border-radius: 12px; padding: 10px 20px; transition: .2s; background: var(--s2); color: var(--t1); backdrop-filter: blur(8px); }
button:hover { background: var(--s3); }
.btn-gold { background: var(--gold); color: white; box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3); border: none; }
.btn-gold:hover { background: #4f46e5; filter: none; }
.btn-red { background: var(--redx); color: var(--red); border-color: var(--red); }
.mb-1 { margin-bottom: 12px; } .mb-2 { margin-bottom: 24px; }
.fraunces, .fraunces-it { font-family: inherit; font-weight: 600; letter-spacing: -0.025em; font-style: normal; }

/* Layout */
.d-header { display: flex; justify-content: space-between; align-items: center; padding: 0 32px; height: 74px; background: rgba(255,255,255,0.05); border-bottom: 1px solid var(--b1); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
.logo { font-size: 24px; font-weight: 600; color: var(--t1); letter-spacing: -0.025em; }
.d-nav { display: flex; gap: 32px; }
.d-nav a { cursor: pointer; color: var(--t2); padding: 24px 0; border-bottom: 2px solid transparent; transition: .2s; font-weight: 500; }
.d-nav a:hover, .d-nav a.active { color: var(--t1); border-bottom-color: var(--gold); }
.m-nav, .fab { display: none; }

#main { max-width: 1200px; margin: 0 auto; padding: 32px; width: 100%; position: relative; z-index: 10; cursor: default; }
.tab-pane { display: none; animation: fadeIn .4s ease; }
.tab-pane.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* Cards & Overview */
.hero-card { position: relative; background: var(--s1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 32px; border-radius: var(--r); border: 1px solid var(--b2); overflow: hidden; margin-bottom: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
.hero-card::after { content: ''; position: absolute; top: -50%; right: -20%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%); border-radius: 50%; pointer-events: none; }
.hero-val { font-size: 48px; font-weight: 300; margin: 8px 0; color: var(--t1); letter-spacing: -0.05em; }
.sub-stats { font-size: 14px; color: var(--t2); display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }

.chips-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; margin-bottom: 16px; scrollbar-width: none; }
.chips-row::-webkit-scrollbar { display: none; }
.chip { flex: 0 0 auto; background: var(--s1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 20px; border-radius: var(--rs); border: 1px solid var(--b1); min-width: 150px; }
.chip-label { font-size: 11px; color: var(--t2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; display: flex; justify-content: space-between; font-weight: 600; }
.chip-val { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; }
.pos { color: var(--green); } .neg { color: var(--red); } .neu { color: var(--t1); }
.gold { color: var(--gold); }

.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px; margin-bottom: 24px; }
.chart-box { background: var(--s1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 24px; border-radius: var(--r); border: 1px solid var(--b1); }
.c-head { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
.c-head h3 { font-size: 18px; font-weight: 500; }
.c-filters button { background: rgba(255,255,255,0.05); border: 1px solid var(--b2); padding: 6px 12px; font-size: 12px; border-radius: 8px; margin-left: 6px; color: var(--t2); font-weight: 500; }
.c-filters button.active { border-color: var(--gold); color: white; background: var(--gold); box-shadow: 0 4px 10px rgba(99,102,241,0.3); }

/* Annual */
.table-container { overflow-x: auto; background: var(--s1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border-radius: var(--r); border: 1px solid var(--b1); }
table { width: 100%; border-collapse: collapse; white-space: nowrap; }
th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid var(--b1); }
th { background: rgba(255,255,255,0.02); color: var(--t2); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; font-weight: 600; }
td:first-child, th:first-child { position: sticky; left: 0; background: rgba(20,25,35,0.9); backdrop-filter: blur(10px); z-index: 10; border-right: 1px solid var(--b1); }
.tr-year td { background: rgba(255,255,255,0.02); color: var(--t1); font-weight: 600; font-size: 15px; border-top: 2px solid var(--b2); }
.tr-dec td { background: rgba(255,255,255,0.02); font-weight: 500; }
.badge { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; margin-left: 8px; font-weight: 600; }
.bg-pos { background: var(--greenx); color: var(--green); border: 1px solid rgba(52,211,153,0.2); } 
.bg-neg { background: var(--redx); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }

/* Sections */
.sec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
.s-card { background: var(--s1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 24px; border-radius: var(--r); border: 1px solid var(--b1); position: relative; overflow: hidden; }
.s-bar { position: absolute; top: 0; left: 0; height: 4px; width: 100%; }
.s-type { font-size: 11px; color: var(--t2); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; margin-bottom: 8px; margin-top: 4px; }
.s-name { font-size: 20px; font-weight: 500; margin-bottom: 16px; }
.s-val { font-size: 28px; font-weight: 300; margin-bottom: 12px; letter-spacing: -0.02em; }
.s-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.rm-btn { color: var(--red); font-size: 12px; cursor: pointer; font-weight: 500; padding: 6px 12px; background: var(--redx); border-radius: 8px; border: 1px solid rgba(248,113,113,0.2); }

/* Settings */
.settings-card { background: var(--s1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); padding: 28px; border-radius: var(--r); border: 1px solid var(--b1); margin-bottom: 24px; }
.settings-card h3 { color: var(--t1); margin-bottom: 20px; font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
.fs-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.sec-list { border: 1px solid var(--b1); border-radius: var(--rs); overflow: hidden; background: rgba(0,0,0,0.1); }
.sl-item { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--b1); align-items: center; }
.sl-item:last-child { border-bottom: none; }
.sl-l { display: flex; align-items: center; gap: 16px; }
.sl-dot { width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 10px currentColor; }
.hint { color: var(--t2); font-size: 12px; margin-top: 6px; }
.flex-row { display: flex; gap: 12px; align-items: center; margin-top: 16px; }

/* Modals */
.modal-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 16px; }
.modal-bg.open { display: flex; animation: fadeIn .2s; }
.modal { background: rgba(20,25,35,0.85); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); width: 100%; max-width: 540px; border-radius: var(--r); border: 1px solid var(--b2); box-shadow: 0 25px 50px -12px rgba(0,0,0,1); display: flex; flex-direction: column; max-height: 90vh; }
.m-head { padding: 24px 28px; border-bottom: 1px solid var(--b1); }
.m-head h2 { font-size: 20px; font-weight: 600; }
.m-body { padding: 28px; overflow-y: auto; flex: 1; }
.m-foot { padding: 20px 28px; border-top: 1px solid var(--b1); display: flex; justify-content: flex-end; gap: 12px; background: rgba(0,0,0,0.2); border-bottom-left-radius: var(--r); border-bottom-right-radius: var(--r); }
.m-body label { display: block; font-size: 12px; color: var(--t2); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.em-row { display: flex; gap: 16px; }
.em-banner { background: rgba(0,0,0,0.2); padding: 16px; border-radius: var(--rs); border: 1px solid var(--b1); display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; font-size: 12px; text-align: center; }
.eb-col { display: flex; flex-direction: column; gap: 4px; }
.eb-lbl { color: var(--t2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.em-label { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-weight: 600; font-size: 14px; }
.em-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.input-grp { position: relative; display: flex; align-items: center; margin-bottom: 16px; }
.input-grp input { padding-right: 48px; }
.input-grp button { position: absolute; right: 6px; padding: 4px 10px; background: var(--b1); color: var(--t1); border-radius: 8px; font-size: 14px; top: 6px; bottom: 6px; display: flex; align-items: center; }
.collapsible { border: 1px solid var(--b1); border-radius: var(--rs); padding: 16px; transition: .2s; background: rgba(255,255,255,0.02); }
.collapsible.open { border-color: var(--b2); background: rgba(255,255,255,0.05); }
.btn-collapsible { width: 100%; text-align: left; display: flex; justify-content: space-between; font-weight: 600; color: var(--t1); background: none; padding: 0; backdrop-filter: none; }
.collapse-content { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--b1); }
.rec-total { text-align: right; margin-top: 12px; font-weight: 600; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid var(--b1); }
.em-body-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--t1); }

/* Popover */
.popover { position: absolute; background: rgba(20,25,35,0.95); backdrop-filter: blur(16px); border: 1px solid var(--b2); padding: 12px; border-radius: var(--rs); box-shadow: 0 20px 40px rgba(0,0,0,0.5); display: none; z-index: 2000; gap: 8px; align-items: center; }
.popover.open { display: flex; animation: fadeIn .2s; }
.popover input { width: 120px; }

/* Colors picker */
.colors { display: flex; gap: 16px; padding: 8px 0; }
.cd { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: .2s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
.cd.sel { border-color: white; transform: scale(1.15); box-shadow: 0 0 15px currentColor; }

/* Toast */
#toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-20px); opacity: 0; background: rgba(52,211,153,0.9); backdrop-filter: blur(8px); color: #000; font-weight: 600; padding: 10px 24px; border-radius: 24px; font-size: 14px; z-index: 9999; pointer-events: none; transition: .3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 25px rgba(52,211,153,0.3); }
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

.mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
.mesh-1 { position: absolute; top: -10%; left: -5%; width: 500px; height: 500px; background: rgba(79, 70, 229, 0.3); border-radius: 50%; filter: blur(120px); }
.mesh-2 { position: absolute; bottom: -10%; right: 5%; width: 600px; height: 600px; background: rgba(16, 185, 129, 0.2); border-radius: 50%; filter: blur(140px); }
.mesh-3 { position: absolute; top: 20%; right: -10%; width: 400px; height: 400px; background: rgba(147, 51, 234, 0.2); border-radius: 50%; filter: blur(100px); }

@media(max-width: 900px) {
  .d-header { display: none; }
  .m-nav { display: flex; position: fixed; bottom: 0; left: 0; width: 100%; height: calc(64px + env(safe-area-inset-bottom)); background: rgba(20,25,35,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--b1); z-index: 100; padding-bottom: env(safe-area-inset-bottom); justify-content: space-around; align-items: center; }
  .m-nav a { font-size: 22px; transition: .2s; border: none; padding: 10px; color: var(--t2); }
  .m-nav a.active { color: var(--t1); transform: scale(1.15); filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
  .fab { display: flex; position: fixed; bottom: calc(80px + env(safe-area-inset-bottom)); right: 24px; width: 56px; height: 56px; border-radius: 16px; background: var(--gold); color: white; font-size: 28px; font-weight: 300; z-index: 100; justify-content: center; align-items: center; box-shadow: 0 10px 25px rgba(99,102,241,0.4); border: 1px solid rgba(255,255,255,0.2); }
  body { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
  #main { padding: 16px; }
  .em-grid { grid-template-columns: 1fr; }
  .modal-bg { align-items: flex-end; padding: 0; }
  .modal { border-radius: 32px 32px 0 0; max-height: 85vh; border-bottom: none; }
  .chart-grid { grid-template-columns: 1fr; }
  .hero-val { font-size: 36px; }
  .em-banner { grid-template-columns: 1fr; text-align: left; }
  td, th { font-size: 13px; padding: 12px 16px; }
  .sub-stats { gap: 8px; flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
  <div class="mesh-bg">
    <div class="mesh-1"></div>
    <div class="mesh-2"></div>
    <div class="mesh-3"></div>
  </div>
  <!-- Desktop Nav -->
  <header class="d-header">
    <div class="logo">Patrimonio</div>
    <nav class="d-nav">
      <a data-t="overview" class="active">Overview</a>
      <a data-t="annual">Annual</a>
      <a data-t="sections">Sections</a>
      <a data-t="settings">Settings</a>
    </nav>
    <div class="h-actions">
      <button onclick="openEntryModal()" class="btn-gold">+ Insert</button>
    </div>
  </header>

  <!-- Mobile Nav -->
  <nav class="m-nav">
    <a data-t="overview" class="active">◈</a>
    <a data-t="annual">📅</a>
    <a data-t="sections">◑</a>
    <a data-t="settings">⚙</a>
  </nav>

  <button class="fab" onclick="openEntryModal()">+</button>

  <main id="main">
    <!-- OVERVIEW TAB -->
    <div id="tab-overview" class="tab-pane active">
      <div id="overview-content"></div>
    </div>

    <!-- ANNUAL TAB -->
    <div id="tab-annual" class="tab-pane">
      <div id="annual-hero"></div>
      <div class="table-container">
        <table id="annual-table">
          <thead id="at-head"></thead>
          <tbody id="at-body"></tbody>
        </table>
      </div>
    </div>

    <!-- SECTIONS TAB -->
    <div id="tab-sections" class="tab-pane">
      <div class="sec-grid" id="sections-grid"></div>
    </div>

    <!-- SETTINGS TAB -->
    <div id="tab-settings" class="tab-pane">
      <div class="settings-card">
        <h3>⚙ PREFERENCES</h3>
        <label>Default salary day (1-31):</label>
        <input type="number" id="set-sday" min="1" max="31" onchange="saveSettings()">
        <p class="hint">Can be overridden per month in the entry modal.</p>
      </div>

      <div class="settings-card">
        <div class="fs-row">
          <h3>CONFIGURED SECTIONS</h3>
          <button onclick="openAddSecModal()" class="btn-gold">+ Add Section</button>
        </div>
        <div class="sec-list" id="set-sec-list"></div>
      </div>

      <div class="settings-card">
        <h3>DATA · BACKUP</h3>
        <p class="hint">Export and save to Google Drive for cross-device access.</p>
        <div class="flex-row">
          <button class="btn" onclick="exportData()">↑ Export JSON</button>
          <button class="btn" onclick="document.getElementById('import-file').click()">↓ Import JSON</button>
          <input type="file" id="import-file" style="display:none" onchange="importData(event)" accept=".json">
        </div>
      </div>
    </div>
  </main>

  <!-- MODALS -->
  <div id="entry-modal" class="modal-bg">
    <div class="modal">
      <div class="m-head"><h2 class="fraunces">Data <span class="fraunces-it">Entry</span></h2></div>
      <div class="m-body">
        <div class="em-row mb-1">
          <select id="em-year" onchange="rebuildEntryFields()"></select>
          <select id="em-month" onchange="rebuildEntryFields()"></select>
          <input type="number" id="em-sday" min="1" max="31" onchange="rebuildEntryFields()">
        </div>
        <div id="em-banner" class="em-banner mb-2"></div>
        <div id="em-bank"></div>
        <div id="em-broker" class="em-grid mb-2"></div>
        <div id="em-rec" class="mb-2"></div>
        <div class="collapsible mb-2">
          <button onclick="toggleNonRec()" class="btn-collapsible" id="nr-toggle">
            ⚡ Add non-recurring contributions <span id="nr-icon">＋</span>
          </button>
          <div id="nr-content" class="collapse-content" style="display:none"></div>
        </div>
        <div>
          <label>Notes</label>
          <input type="text" id="em-note" placeholder="Optional notes...">
        </div>
      </div>
      <div class="m-foot">
        <button class="btn" onclick="closeModal('entry-modal')">Cancel</button>
        <button class="btn-gold" onclick="saveEntry()">Save</button>
      </div>
    </div>
  </div>

  <div id="add-sec-modal" class="modal-bg">
    <div class="modal">
      <div class="m-head"><h2 class="fraunces">Add <span class="fraunces-it">Section</span></h2></div>
      <div class="m-body">
        <label>Name</label><input type="text" id="sm-name" class="mb-1">
        <label>Type</label>
        <select id="sm-type" class="mb-1" onchange="document.getElementById('sm-rec-row').style.display = this.value==='bank_account'?'none':'block'">
          <option value="bank_account">Bank Account</option><option value="broker">Broker</option><option value="pension_fund">Pension Fund</option>
        </select>
        <div id="sm-rec-row" style="display:none">
          <label>Default Recurring</label><input type="number" id="sm-rec" class="mb-1">
        </div>
        <label>Color</label>
        <div class="colors mb-1" id="sm-colors"></div>
        <input type="hidden" id="sm-color">
      </div>
      <div class="m-foot">
        <button class="btn" onclick="closeModal('add-sec-modal')">Cancel</button>
        <button class="btn-gold" onclick="saveSection()">Add</button>
      </div>
    </div>
  </div>

  <div id="rec-edit-modal" class="modal-bg">
    <div class="modal">
      <div class="m-head"><h2 class="fraunces">Edit <span class="fraunces-it">Recurring</span></h2></div>
      <div class="m-body">
        <h3 id="rem-title" class="mb-1"></h3>
        <input type="number" id="rem-val" class="mb-1">
      </div>
      <div class="m-foot">
        <button class="btn-red" onclick="saveRecEdit(0)">Remove (set to 0)</button>
        <button class="btn-gold" onclick="saveRecEdit()">Save</button>
      </div>
    </div>
  </div>

  <div id="over-modal" class="modal-bg">
    <div class="modal">
      <div class="m-head"><h2 class="fraunces">Override <span class="fraunces-it">Expenses</span></h2></div>
      <div class="m-body">
        <p class="mb-1" id="ovm-calc"></p>
        <label>New Real Expenses (€)</label>
        <input type="number" id="ovm-val" class="mb-1">
      </div>
      <div class="m-foot">
        <button class="btn" onclick="saveOverride(true)">Restore automatic</button>
        <button class="btn-gold" onclick="saveOverride(false)">Save Override</button>
      </div>
    </div>
  </div>

  <div id="add-popover" class="popover">

// Logic
function getSection(id) { return STATE.sections.find(s => s.id === id); }
function getEntry(ym) { return STATE.entries.find(e => e.ym === ym); }
function allYMs() { return [...new Set(STATE.entries.map(e => e.ym))].sort(); }

function secBal(secId, ym) {
  const sec = getSection(secId);
  if(!sec) return 0;
  if(sec.type === 'bank_account') {
    const sorted = allYMs().filter(y => y <= ym);
    for(let i=sorted.length-1; i>=0; i--) {
      const e = getEntry(sorted[i]);
      if(e?.bankAccounts?.[secId]?.post != null) return e.bankAccounts[secId].post;
    }
    return 0;
  } else {
    return getEntry(ym)?.brokers?.[secId] ?? 0;
  }
}

function totalWealth(ym) {
  return STATE.sections.reduce((s, sec) => s + secBal(sec.id, ym), 0);
}

function monthMetrics(ym) {
  const sorted = allYMs();
  const idx = sorted.indexOf(ym);
  if(idx === -1) return null;
  const e = getEntry(ym);
  const prevYm = idx > 0 ? sorted[idx-1] : null;

  let preN=0, postN=0, postPrev=0, hasPre=false, hasPost=false;
  const banks = STATE.sections.filter(s => s.type === 'bank_account');
  for(let sec of banks) {
    const b = e.bankAccounts?.[sec.id];
    if(b?.pre != null) { preN += b.pre; hasPre = true; }
    if(b?.post != null) { postN += b.post; hasPost = true; }
  }
  if(prevYm) {
    for(let sec of banks) postPrev += secBal(sec.id, prevYm);
  }

  const inc = (hasPre && hasPost) ? (postN - preN) : null;
  const gOut = (idx === 0 || !hasPre) ? null : (postPrev - preN);

  let cR=0, cNR=0;
  for(let k in e.contribsRec||{}) cR += e.contribsRec[k];
  for(let k in e.contribsNonRec||{}) cNR += e.contribsNonRec[k];

  let rExp = gOut !== null ? gOut - cR - cNR : null;
  const ov = STATE.overrides["exp_"+ym];
  const hasOv = ov !== undefined;
  if(hasOv) rExp = ov;

  const flow = (inc !== null && rExp !== null) ? inc - rExp : null;
  const sr = (inc != null && inc != 0 && rExp !== null) ? ((inc - rExp)/inc*100) : null;

  return { inc, gOut, rExp, cR, cNR, flow, sr, hasOv };
}

// Annual
function renderAnnual() {
  const yms = allYMs();
  if(!yms.length) return;
  const years = [...new Set(yms.map(y => y.split('-')[0]))];
  let hHero = `<div class="hero-card" style="margin-bottom:16px"><h3 class="fraunces">📊 PATRIMONY HISTORY</h3>`;
       
  const firstTw = totalWealth(yms[0]);
  const lastTw = totalWealth(yms[yms.length-1]);
  const overallDt = lastTw - firstTw;
  const overallDp = firstTw ? overallDt/firstTw*100 : 0;
  
  hHero += `<div class="sub-stats" style="margin-top:8px">${years[0]} → ${years[years.length-1]} | Overall: <span class="${colorClass(overallDt)}">${fd(overallDt)}</span> <span class="${colorClass(overallDp)}">${fp(overallDp)}</span> | Years: ${years.length}</div></div>`;
  document.getElementById('annual-hero').innerHTML = hHero;

  let th = `<tr><th>Month</th><th>Total</th><th>Δ€</th><th>Δ%</th>`;
  STATE.sections.forEach(s => { th += `<th><span style="color:${s.color}">●</span> ${s.name}${s.archived?' (Ar.)':''}</th>`; });
  th += `<th>Net Salary</th><th>Real Exp</th><th>Rec</th><th>Non-Rec</th><th>Net Flow</th><th>Sav%</th></tr>`;
  document.getElementById('at-head').innerHTML = th;

  let tb = '';
  years.forEach(yr => {
    const yrYms = yms.filter(y => y.startsWith(yr));
    const yrFirst = totalWealth(yrYms[0]);
    const yrLast = totalWealth(yrYms[yrYms.length-1]);
    const dtY = yrLast - totalWealth(yms[Math.max(0, yms.indexOf(yrYms[0])-1)]); // from end of prev yr
    const dpY = totalWealth(yms[Math.max(0, yms.indexOf(yrYms[0])-1)]) ? dtY/totalWealth(yms[Math.max(0, yms.indexOf(yrYms[0])-1)])*100 : 0;

    tb += `<tr class="tr-year"><td colspan="100%">📅 ${yr} <span class="badge ${dtY>=0?'bg-pos':'bg-neg'}">${fd(dtY)}</span> <span class="badge ${dpY>=0?'bg-pos':'bg-neg'}">${fp(dpY)}</span></td></tr>`;
    
    yrYms.forEach(ym => {
      const idx = yms.indexOf(ym);
      const isDec = ym.endsWith('-12');
      const tw = totalWealth(ym);
      const pYm = idx>0 ? yms[idx-1] : null;
      const pt = pYm ? totalWealth(pYm) : 0;
      const dt = pYm ? tw - pt : null;
      const dp = pt ? dt/pt*100 : null;
      const m = monthMetrics(ym);
      const e = getEntry(ym);

      let tooltip = 'Breakdown:&#10;';
      STATE.sections.forEach(s => tooltip += `${s.name}: ${fe(secBal(s.id,ym))}&#10;`);
      
      let datesStr = '';
      if (e) {
        STATE.sections.forEach(s => {
           if (e.contribDatesRec?.[s.id] || e.contribDatesNonRec?.[s.id]) {
               datesStr += `${s.name} contrib. dates: ${e.contribDatesRec?.[s.id] || ''} ${e.contribDatesNonRec?.[s.id] || ''}&#10;`;
           }
        });
      }
      if (datesStr) tooltip += '&#10;Dates:&#10;' + datesStr;

      tb += `<tr class="${isDec?'tr-dec':''}"><td style="white-space:nowrap">${isDec?'🎯 ':''}${ym}</td>
        <td title="${tooltip}">${fe(tw)}</td><td class="${colorClass(dt)}">${fd(dt)}</td><td class="${colorClass(dp)}">${fp(dp)}</td>`;
      STATE.sections.forEach(s => { tb += `<td>${fe(secBal(s.id, ym))}</td>`; });
      tb += `<td>${fe(m.inc)}</td><td class="neg" ${m.hasOv?'style="text-decoration:underline" title="Overridden"':''}>${fe(m.rExp)}</td><td>${fe(m.cR)}</td><td>${m.cNR?fe(m.cNR):'—'}</td><td class="${colorClass(m.flow)}">${fd(m.flow)}</td><td class="${m.sr>=30?'pos':m.sr>=15?'neu':'neg'}">${fp(m.sr)}</td></tr>`;
    });
    
    tb += `<tr class="tr-year" style="opacity:0.8"><td colspan="4">📊 Total ${yr}</td>`;
    STATE.sections.forEach(s => { tb += `<td>${fe(secBal(s.id, yrYms[yrYms.length-1]))}</td>`; });
    tb += `<td colspan="6"></td></tr>`;
  });
  document.getElementById('at-body').innerHTML = tb;
}

  let h = '';

    const v = lastYm ? secBal(s.id, lastYm) : 0;
    const pv = prevYm ? secBal(s.id, prevYm) : 0;
    const dt = pv?v-pv:null;
    const dp = pv?dt/pv*100:null;
    h += `<div class="s-card" style="${s.archived ? 'opacity:0.6' : ''}"><div class="s-bar" style="background:${s.color}"></div>

      <div class="s-val">${fe(v)}</div>
      <div style="font-size:11px">Δ€: <span class="${colorClass(dt)}">${fd(dt)}</span> &nbsp; Δ%: <span class="${colorClass(dp)}">${fp(dp)}</span></div>
      <div class="s-foot"><div class="rm-btn" onclick="rmSec('${s.id}')">Remove</div></div>
    </div>`;
  });
  document.getElementById('sections-grid').innerHTML = h;
}
function toggleArchiveSec(id) {
  const s = getSection(id);
  if(s) {
    s.archived = !s.archived;
    saveState(); renderAll(); showToast(s.archived ? "Section archived" : "Section unarchived");
  }
}

function rmSec(id) {
  if(!confirm("Remove section entirely? All historic data for it will be lost.")) return;
  STATE.sections = STATE.sections.filter(s => s.id !== id);
  STATE.entries.forEach(e => {
    if(e.bankAccounts) delete e.bankAccounts[id];
    if(e.brokers) delete e.brokers[id];
    if(e.contribsRec) delete e.contribsRec[id];
    if(e.contribsNonRec) delete e.contribsNonRec[id];
  });
  saveState(); renderAll(); showToast("Section removed");
}

function exportData() {
  const data = JSON.stringify(STATE, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `patrimonio_${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  a.click(); URL.revokeObjectURL(url);
}
function importData(e) {
  const f = e.target.files[0];
  if(!f) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.settings && data.sections) { STATE = data; saveState(); renderAll(); showToast("Imported successfully"); }
    } catch(err) { alert("Invalid JSON"); }
  };
  reader.readAsText(f);
}

function saveOverride(restore) {
  if(!activeOvYm) return;
  if(restore) {
    delete STATE.overrides["exp_"+activeOvYm];
  } else {
    STATE.overrides["exp_"+activeOvYm] = parseFloat(document.getElementById('ovm-val').value) || 0;
  }
  saveState(); closeModal('over-modal'); renderAll();
}

function renderAll() { renderOverview(); renderAnnual(); renderSections(); renderSettings(); }

// Entry
let em_ym = "";
let em_salaryDay = 25;

function openEntryModal(ym = null) {
  if(!ym) {
    const d = new Date();
    ym = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }
  em_ym = ym;
  const e = getEntry(ym);
  em_salaryDay = e?.salaryDay || STATE.settings.salaryDay || 25;
  
  const curYr = new Date().getFullYear();
  let yOps = ''; for(let y=curYr-2; y<=curYr+2; y++) yOps += `<option ${y==ym.split('-')[0]?'selected':''}>${y}</option>`;
  document.getElementById('em-year').innerHTML = yOps;
  
  const moIt = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  let mOps = ''; moIt.forEach((m,i) => mOps += `<option value="${String(i+1).padStart(2,'0')}" ${i+1==ym.split('-')[1]?'selected':''}>${m}</option>`);
  document.getElementById('em-month').innerHTML = mOps;
  document.getElementById('em-sday').value = em_salaryDay;
  
  rebuildEntryFields();
  document.getElementById('entry-modal').classList.add('open');
}

function rebuildEntryFields() {
  const y = document.getElementById('em-year').value;
  const m = document.getElementById('em-month').value;
  const ym = y + '-' + m;
  em_salaryDay = parseInt(document.getElementById('em-sday').value, 10) || 25;
  const pday = Math.max(1, em_salaryDay - 1);
  const moIt = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const cM = moIt[parseInt(m,10)-1];
  const pM = moIt[parseInt(m,10)-2 < 0 ? 11 : parseInt(m,10)-2];
  
  document.getElementById('em-banner').innerHTML = `
    <div class="eb-col"><span class="eb-lbl">📅 Entry month</span><span style="color:var(--gold);font-weight:bold">${cM} ${y}</span></div>
    <div class="eb-col"><span class="eb-lbl">💸 Expense period</span><span style="color:var(--red);font-weight:bold">${em_salaryDay}th ${pM} → ${pday}th ${cM}</span></div>
    <div class="eb-col"><span class="eb-lbl">📥 Contributions</span><span style="color:var(--green);font-weight:bold">1st ${cM}</span></div>
  `;
  
  const e = getEntry(ym);
  
  let hBa = '';
  STATE.sections.filter(s=>s.type==='bank_account' && (!s.archived || e?.bankAccounts?.[s.id] != null)).forEach(s => {
    const d = e?.bankAccounts?.[s.id];
    hBa += `
      <div class="em-label"><span style="color:${s.color}">●</span> ${s.name} (BANK ACCOUNT)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label>Balance ${pday}th - pre (€)</label>
        <div class="input-grp"><input type="number" id="emp-${s.id}" value="${d?.pre!=null?d.pre:''}"><button onclick="openAddPopover('emp-${s.id}', this)">＋</button></div></div>
        <div><label>Balance ${em_salaryDay}th - post (€)</label>
        <div class="input-grp"><input type="number" id="empo-${s.id}" value="${d?.post!=null?d.post:''}"><button onclick="openAddPopover('empo-${s.id}', this)">＋</button></div></div>
      </div>
      <div class="hint mb-1">hint: "Net salary = ${em_salaryDay}th − ${pday}th"</div>
    `;
  });
  document.getElementById('em-bank').innerHTML = hBa;

  let hBr = '';
  STATE.sections.filter(s=>s.type!=='bank_account' && (!s.archived || e?.brokers?.[s.id] != null)).forEach(s => {
    hBr += `<div><div class="em-label"><span style="color:${s.color}">●</span> ${s.name}${s.archived?' <span style="font-size:11px;color:var(--t2);font-weight:normal">(Archived)</span>':''}</div>
    <div class="input-grp"><input type="number" id="emi-${s.id}" value="${e?.brokers?.[s.id]!=null?e.brokers[s.id]:''}"><button onclick="openAddPopover('emi-${s.id}', this)">＋</button></div></div>`;
  });
  document.getElementById('em-broker').innerHTML = hBr;

  let hRec = '', rT = 0;
  const ovs = STATE.sections.filter(s=>s.type!=='bank_account' && (!s.archived || e?.contribsRec?.[s.id] != null || e?.contribsNonRec?.[s.id] != null || e?.brokers?.[s.id] != null));
  if(ovs.length) {
    hRec = `<h4>📅 Recurring Contributions <span class="hint">[subtracted from gross expenses]</span></h4><div class="em-grid" style="margin-top:12px">`;
    ovs.forEach(s => {
      const v = e?.contribsRec?.[s.id] ?? (s.archived ? 0 : (s.recurringContrib ?? 0));
      const dR = e?.contribDatesRec?.[s.id] || '';
      rT += v;
      hRec += `<div><div class="em-label"><span style="color:${s.color}">●</span> ${s.name}${s.archived?' <span style="font-size:11px;color:var(--t2);font-weight:normal">(Archived)</span>':''}</div>
      <div style="display:flex;gap:8px">
        <div class="input-grp" style="flex:1;margin-bottom:0"><input type="number" class="irec" oninput="updRec()" id="emcr-${s.id}" value="${v}"><button onclick="openAddPopover('emcr-${s.id}', this)">＋</button></div>
        <input type="date" id="emcr-date-${s.id}" value="${dR}" style="width:45%;padding:10px 8px" title="Date (optional)">
      </div></div>`;
    });
    hRec += `</div><div class="rec-total" style="color:var(--green)">Total recurring: € <span id="rT">${rT}</span></div>`;
  }
  document.getElementById('em-rec').innerHTML = hRec;

  let hNR = '<h4>⚡ Non-Recurring Contributions <span class="hint" style="color:var(--gold)">[NOT subtracted from expenses]</span></h4><div class="em-grid" style="margin-top:12px">';
  let nrT = 0;
  ovs.forEach(s => {
    const v = e?.contribsNonRec?.[s.id] || '';
    const dNR = e?.contribDatesNonRec?.[s.id] || '';
    if(v) nrT += parseFloat(v);
    hNR += `<div><div class="em-label"><span style="color:${s.color}">●</span> ${s.name}${s.archived?' <span style="font-size:11px;color:var(--t2);font-weight:normal">(Archived)</span>':''}</div>
    <div style="display:flex;gap:8px">
      <div class="input-grp" style="flex:1;margin-bottom:0"><input type="number" class="inrec" oninput="updRec()" id="emcnr-${s.id}" value="${v}"><button onclick="openAddPopover('emcnr-${s.id}', this)">＋</button></div>
      <input type="date" id="emcnr-date-${s.id}" value="${dNR}" style="width:45%;padding:10px 8px" title="Date (optional)">
    </div></div>`;
  });
  hNR += `</div><div class="rec-total" style="color:var(--gold)">Total non-recurring: € <span id="nrT">${nrT}</span></div>`;
  document.getElementById('nr-content').innerHTML = hNR;

  if(nrT > 0 && !document.getElementById('nr-toggle').parentElement.classList.contains('open')) toggleNonRec();
  document.getElementById('em-note').value = e?.note || '';
}

function updRec() {
  let r=0, nr=0;
  document.querySelectorAll('.irec').forEach(i => r+=parseFloat(i.value)||0);
  document.querySelectorAll('.inrec').forEach(i => nr+=parseFloat(i.value)||0);
  const elR = document.getElementById('rT'); if(elR) elR.textContent = r;
  const elNr = document.getElementById('nrT'); if(elNr) elNr.textContent = nr;
}

function toggleNonRec() {
  const c = document.getElementById('nr-content').parentElement;
  const o = c.classList.toggle('open');
  document.getElementById('nr-content').style.display = o ? 'block' : 'none';
  document.getElementById('nr-icon').textContent = o ? '－' : '＋';
}

function saveEntry() {
  const ym = document.getElementById('em-year').value + '-' + document.getElementById('em-month').value;
  let o = { ym, salaryDay: em_salaryDay, bankAccounts:{}, brokers:{}, contribsRec:{}, contribsNonRec:{}, contribDatesRec:{}, contribDatesNonRec:{}, note: document.getElementById('em-note').value };
  
  STATE.sections.forEach(s => {
    if(s.type === 'bank_account') {
      const p = parseFloat(document.getElementById('emp-'+s.id).value);
      const po = parseFloat(document.getElementById('empo-'+s.id).value);
      if(!isNaN(p) || !isNaN(po)) o.bankAccounts[s.id] = { pre: isNaN(p)?null:p, post: isNaN(po)?null:po };
    } else {
      const v = parseFloat(document.getElementById('emi-'+s.id).value);
      if(!isNaN(v)) o.brokers[s.id] = v;
      
      const cr = parseFloat(document.getElementById('emcr-'+s.id)?.value);
      if(!isNaN(cr) && cr>0) {
        o.contribsRec[s.id] = cr;
        const dR = document.getElementById('emcr-date-'+s.id)?.value;
        if(dR) o.contribDatesRec[s.id] = dR;
      }
      
      const cnr = parseFloat(document.getElementById('emcnr-'+s.id)?.value);
      if(!isNaN(cnr) && cnr>0) {
        o.contribsNonRec[s.id] = cnr;
        const dNR = document.getElementById('emcnr-date-'+s.id)?.value;
        if(dNR) o.contribDatesNonRec[s.id] = dNR;
      }
    }
  });

  const idx = STATE.entries.findIndex(x => x.ym === ym);
  if(idx > -1) STATE.entries[idx] = o; else STATE.entries.push(o);
  
  STATE.entries.sort((a,b) => a.ym.localeCompare(b.ym));
  saveState(); closeModal('entry-modal'); renderAll(); showToast('Saved '+ym);
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// Popover
let aaId = null;
function openAddPopover(id, btn) {
  aaId = id; const p = document.getElementById('add-popover');
  p.classList.add('open');
  const r = btn.getBoundingClientRect();
  p.style.top = (r.bottom + window.scrollY + 8) + 'px';
  p.style.left = (r.left + window.scrollX - 120) + 'px';
  document.getElementById('pop-amount').value = '';
  document.getElementById('pop-amount').focus();
}
function confirmAddPopover() {
  if(!aaId) return;
  const i = document.getElementById(aaId);
  const v = parseFloat(document.getElementById('pop-amount').value);
  if(!isNaN(v)) { i.value = (parseFloat(i.value)||0) + v; i.dispatchEvent(new Event('input')); }
  document.getElementById('add-popover').classList.remove('open');
  aaId = null;
}
document.addEventListener('click', e => {
  if(!e.target.closest('#add-popover') && !e.target.closest('.input-grp button')) {
    document.getElementById('add-popover').classList.remove('open');
  }
});
</script>
</body>
</html>
